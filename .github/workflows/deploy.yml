name: Deploy Quartz site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Quartz
        run: |
          git clone --branch v5 --depth 1 https://github.com/jackyzha0/quartz.git
          cd quartz
          npm ci

      - name: Configure Quartz
        run: cp .quartz/quartz.config.yaml quartz/quartz.config.yaml

      - name: Install Quartz plugins
        run: |
          cd quartz
          npx quartz plugin install

      - name: Build Quartz site
        run: |
          cd quartz
          for path in ../*; do
            [ "$(basename "$path")" = "quartz" ] && continue
            cp -a "$path" content/
          done
          rm -rf content/.git content/.github
          git -C .. ls-files -z | while IFS= read -r -d '' file; do
            target="content/$file"
            [ -f "$target" ] || continue
            date=$(git -C .. log -1 --format=%cI -- "$file")
            [ -n "$date" ] && touch -d "$date" "$target"
          done
          npx quartz build --baseDir "/logos-storage-docs-obsidian"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./quartz/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
